version: 2
updates:
  # npm — up to 2 open PRs: one for safe minor/patch, one for major (30-day cooldown).
  # Review requests: CODEOWNERS only (no duplicate reviewers here or in workflows).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
    labels:
      - "dependencies"
    open-pull-requests-limit: 1
    versioning-strategy: increase
    cooldown:
      default-days: 7
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 7
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      npm-major:
        patterns:
          - "*"
        update-types:
          - "major"
